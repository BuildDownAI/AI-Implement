name: Build session image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.session"
      - "session/**"
      - ".github/workflows/build-session-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR namespaces must be lowercase; github.repository_owner preserves
      # the original casing, so lowercase it here.
      - name: Compute image namespace
        id: ns
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.session
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/ai-implement-runner:${{ github.sha }}
            ghcr.io/${{ steps.ns.outputs.owner }}/ai-implement-runner:latest
