name: Deploy clients

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      client:
        description: "Client slug to deploy (leave empty to deploy all)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy matrix from clients/*.toml
        id: build-matrix
        env:
          FILTER: ${{ github.event.inputs.client }}
        run: |
          clients=()
          for f in clients/*.toml; do
            [ -f "$f" ] || continue
            [[ "$f" == *"example-client"* ]] && continue

            slug=$(grep -E '^slug\s*=' "$f" | head -1 | sed 's/.*=\s*//;s/"//g;s/\s*$//')
            app=$(grep -E '^app_name\s*=' "$f" | head -1 | sed 's/.*=\s*//;s/"//g;s/\s*$//')

            [ -z "$slug" ] && continue
            [ -z "$app" ]  && continue

            if [ -n "$FILTER" ] && [ "$slug" != "$FILTER" ]; then
              continue
            fi

            clients+=("{\"slug\":\"$slug\",\"app\":\"$app\"}")
          done

          if [ ${#clients[@]} -eq 0 ]; then
            echo "No clients found in clients/*.toml (or filter '$FILTER' matched nothing)."
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          joined=$(IFS=,; echo "${clients[*]}")
          echo "matrix={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    name: Deploy ${{ matrix.slug }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app "${{ matrix.app }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
