# The pushed package (ghcr.io/<owner>/ai-implement-runner) MUST be public on
# GHCR — Fly Machines pulls it anonymously when launching session VMs and a
# 401 here surfaces as "failed to get manifest ... unauthorized" in the
# orchestrator logs. New GHCR packages default to Private. To flip:
#   1. Org → Settings → Packages: ensure "Public" is allowed under container
#      package visibility (org admins gate this).
#   2. Package → Settings → Change visibility → Public.
# This is a one-time setting per package; subsequent pushes preserve it.

name: Build runner image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.session"
      - "session/**"
      - ".github/workflows/build-runner.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          # GHCR namespaces must be lowercase; github.repository_owner preserves
          # the original casing, so lowercase it here.
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner}/ai-implement-runner" >> "$GITHUB_OUTPUT"
          echo "date_tag=base-v$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.session
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.date_tag }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
