# Generic Fly.io app config for the orchestrator. Override `app` per deployment
# (or use `clients/<slug>.toml` with the multi-client deploy workflow).
app = "ai-implement"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "dedup_data"
  destination = "/data"
