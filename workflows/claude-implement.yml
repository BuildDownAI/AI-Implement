# Synced to target repos by sync-workflow.yml.
# All pipeline logic lives in the runner image (ghcr.io/eudoxus-ai/ai-implement-runner).
# Do not edit in target repos.
#
# Required secrets:
#   AI_IMPLEMENT_APP_ID      - GitHub App numeric ID
#   AI_IMPLEMENT_PRIVATE_KEY - GitHub App PEM private key
#   ANTHROPIC_API_KEY        - Anthropic API key
#   CLAUDE_CODE_OAUTH_TOKEN  - Claude Code OAuth token (preferred over API key)
#   LINEAR_API_KEY           - Linear API key for status updates
#
# Additional secret (Bedrock provider):
#   AWS_BEDROCK_ROLE_ARN     - IAM role ARN trusted to GitHub OIDC; needs bedrock:InvokeModel
#
# Required repo setting:
#   Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests" → ENABLED

name: Claude AI Implementation

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Linear issue UUID"
        required: true
        type: string
      issue_identifier:
        description: "Linear issue identifier (e.g., ENG-123)"
        required: true
        type: string
      issue_title:
        description: "Linear issue title"
        required: true
        type: string
      issue_description:
        description: "Linear issue description"
        required: true
        type: string
      pr_number:
        description: "Existing PR number for gap-fill runs (leave empty for new implementation)"
        required: false
        type: string
        default: ""
      provider:
        description: "Claude provider: 'anthropic' (default) or 'bedrock'"
        required: false
        type: string
        default: "anthropic"
      aws_region:
        description: "AWS region for Bedrock (required when provider=bedrock)"
        required: false
        type: string
        default: ""
      runner_callback_url:
        description: "Base URL the orchestrator advertises for /runner/result; empty skips callback"
        required: false
        type: string
        default: ""
      run_token:
        description: "HMAC bearer token authorizing the result POST; empty skips callback"
        required: false
        type: string
        default: ""
      runner_image:
        description: "Override the default runner image (ghcr.io/eudoxus-ai/ai-implement-runner:next)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: ${{ inputs.runner_image != '' && inputs.runner_image || 'ghcr.io/eudoxus-ai/ai-implement-runner:next' }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AI_IMPLEMENT_APP_ID }}
          private-key: ${{ secrets.AI_IMPLEMENT_PRIVATE_KEY }}

      - name: Configure AWS credentials (Bedrock)
        if: inputs.provider == 'bedrock'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-duration: 14400

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_ID: ${{ inputs.issue_id }}
          ISSUE_IDENTIFIER: ${{ inputs.issue_identifier }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_DESCRIPTION: ${{ inputs.issue_description }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PROVIDER: ${{ inputs.provider }}
          AWS_REGION: ${{ inputs.aws_region }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          RUNNER_CALLBACK_URL: ${{ inputs.runner_callback_url }}
          RUN_TOKEN: ${{ inputs.run_token }}
        run: /opt/ai-implement/entrypoint.sh
